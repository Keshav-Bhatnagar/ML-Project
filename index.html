<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeon Space — Venture Past Our Sky</title>
  <meta name="description" content="Discover the universe in ways once unimaginable. Pioneering vessels and breakthrough engineering bring deep-space exploration within reach." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["'Instrument Serif'", "serif"],
            body: ["'Barlow'", "sans-serif"],

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; color: #fff; overflow-x: hidden; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.Motion || window.FramerMotion || {};</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Suppress benign list-key dev warnings
    const _origError = console.error;
    console.error = function() {
      if (arguments[0] && typeof arguments[0] === "string" && arguments[0].includes("Each child in a list")) return;
      _origError.apply(console, arguments);
    };

    const { useState, useEffect, useRef, useCallback } = React;
    const Motion = window.Motion;
    const { motion, useAnimation, AnimatePresence } = Motion;

    // ─── FadingVideo ───────────────────────────────
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo(props) {
      var src = props.src;
      var className = props.className;
      var style = props.style;

      var videoRef = useRef(null);
      var rafRef = useRef(null);
      var fadingOutRef = useRef(false);

      var fadeTo = useCallback(function(target, duration) {
        var video = videoRef.current;
        if (!video) return;
        cancelAnimationFrame(rafRef.current);
        var start = performance.now();
        var startOpacity = parseFloat(video.style.opacity) || 0;
        var delta = target - startOpacity;

        function step(now) {
          var elapsed = now - start;
          var t = Math.min(elapsed / duration, 1);
          video.style.opacity = String(startOpacity + delta * t);
          if (t < 1) rafRef.current = requestAnimationFrame(step);
        }
        rafRef.current = requestAnimationFrame(step);
      }, []);

      useEffect(function() {
        var video = videoRef.current;
        if (!video) return;

        function onLoadedData() {
          video.style.opacity = "0";
          video.play().catch(function(){});
          fadeTo(1, FADE_MS);
        }
        function onTimeUpdate() {
          if (!fadingOutRef.current && video.duration > 0) {
            var remaining = video.duration - video.currentTime;
            if (remaining <= FADE_OUT_LEAD && remaining > 0) {
              fadingOutRef.current = true;
              fadeTo(0, FADE_MS);
            }
          }
        }
        function onEnded() {
          video.style.opacity = "0";
          setTimeout(function() {
            video.currentTime = 0;
            video.play().catch(function(){});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        }

        video.style.opacity = "0";
        video.addEventListener("loadeddata", onLoadedData);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);

        return function() {
          cancelAnimationFrame(rafRef.current);
          video.removeEventListener("loadeddata", onLoadedData);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, [fadeTo]);

      var combinedStyle = Object.assign({}, style || {}, { opacity: 0 });

      return React.createElement("video", {
        ref: videoRef,
        src: src,
        autoPlay: true,
        muted: true,
        playsInline: true,
        preload: "auto",
        className: className,
        style: combinedStyle
      });
    }

    // ─── BlurText ──────────────────────────────────
    function BlurText(props) {
      var text = props.text;
      var className = props.className;
      var words = text.split(" ");
      var controls = useAnimation();
      var ref = useRef(null);

      useEffect(function() {
        var observer = new IntersectionObserver(function(entries) {
          if (entries[0].isIntersecting) {
            controls.start("visible");
            observer.disconnect();
          }
        }, { threshold: 0.1 });
        if (ref.current) observer.observe(ref.current);
        return function() { observer.disconnect(); };
      }, [controls]);

      return (
        <p
          ref={ref}
          className={className}
          style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
        >
          {words.map(function(word, i) {
            return (
              <motion.span
                key={i}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={controls}
                variants={{
                  visible: {
                    filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                    opacity: [0, 0.5, 1],
                    y: [50, -5, 0],
                    transition: {
                      duration: 0.7,
                      times: [0, 0.5, 1],
                      ease: "easeOut",
                      delay: (i * 100) / 1000,
                    },
                  },
                }}
                style={{ display: "inline-block", marginRight: "0.28em" }}
              >
                {word}
              </motion.span>
            );
          })}
        </p>
      );
    }

    // ─── Icons ─────────────────────────────────────
    function ArrowUpRight(props) {
      var cls = props.className || "";
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={cls}>
          <path d="M7 17L17 7" />
          <path d="M7 7h10v10" />
        </svg>
      );
    }

    function PlayIcon(props) {
      var cls = props.className || "";
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="currentColor" className={cls}>
          <polygon points="6 4 20 12 6 20 6 4" />
        </svg>
      );
    }

    function ClockSvg() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
          fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      );
    }

    function GlobeSvg() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
          fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      );
    }

    function ImgIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z"/>
        </svg>
      );
    }

    function MovieIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z"/>
        </svg>
      );
    }

    function BulbIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z"/>
        </svg>
      );
    }

    // ─── Navbar ────────────────────────────────────
    function Navbar() {
      var navLinks = ["Home", "Voyages", "Worlds", "Innovation", "Plan Launch"];
      return (
        <nav className="fixed top-4 left-0 right-0 z-50 flex items-center justify-between px-8 lg:px-16">
          <div
            className="liquid-glass flex items-center justify-center text-white font-heading italic text-2xl cursor-pointer"
            style={{ width: 48, height: 48, borderRadius: "50%", flexShrink: 0 }}
          >
            a
          </div>

          <div className="hidden md:flex items-center liquid-glass rounded-full px-1.5 py-1.5 gap-1">
            {navLinks.map(function(link) {
              return (
                <button
                  key={link}
                  className="px-3 py-2 text-sm font-medium text-white/90 font-body rounded-full hover:bg-white/10 transition-colors cursor-pointer whitespace-nowrap"
                >
                  {link}
                </button>
              );
            })}
            <button
              id="claim-spot-btn"
              className="flex items-center gap-1 bg-white text-black px-4 py-2 rounded-full text-sm font-medium font-body whitespace-nowrap hover:bg-white/90 transition-colors cursor-pointer ml-1"
            >
              Claim a Spot
              <ArrowUpRight className="h-4 w-4" />
            </button>
          </div>

          <div style={{ width: 48, height: 48, flexShrink: 0 }} aria-hidden="true" />
        </nav>
      );
    }

    // ─── HeroSection ───────────────────────────────
    var HERO_INITIAL = { filter: "blur(10px)", opacity: 0, y: 20 };
    var HERO_ANIMATE = { filter: "blur(0px)", opacity: 1, y: 0 };
    function heroTrans(delay) {
      return { duration: 0.7, ease: "easeOut", delay: delay };
    }

    function HeroSection() {
      return (
        <section id="hero" className="relative w-full bg-black overflow-hidden flex flex-col" style={{ minHeight: "100vh" }}>
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: "120%", height: "120%" }}
          />

          <div className="relative z-10 flex flex-col" style={{ minHeight: "100vh" }}>
            <Navbar />

            <div className="flex-1 flex flex-col items-center justify-center pt-24 px-4 text-center">

              {/* Badge */}
              <motion.div
                initial={HERO_INITIAL}
                animate={HERO_ANIMATE}
                transition={heroTrans(0.4)}
                className="liquid-glass rounded-full flex items-center gap-2 mb-8"
              >
                <span className="bg-white text-black px-3 py-1 rounded-full text-xs font-semibold font-body">New</span>
                <span className="text-sm text-white/90 font-body pr-3">Maiden Crewed Voyage to Mars Arrives 2026</span>
              </motion.div>

              {/* Headline */}
              <BlurText
                text="Venture Past Our Sky Across the Universe"
                className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl justify-center tracking-[-4px]"
              />

              {/* Sub */}
              <motion.p
                initial={HERO_INITIAL}
                animate={HERO_ANIMATE}
                transition={heroTrans(0.8)}
                className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight"
              >
                Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
              </motion.p>

              {/* CTAs */}
              <motion.div
                initial={HERO_INITIAL}
                animate={HERO_ANIMATE}
                transition={heroTrans(1.1)}
                className="flex items-center gap-6 mt-6"
              >
                <button id="start-voyage-btn" className="liquid-glass-strong rounded-full px-5 py-2.5 text-sm font-medium text-white flex items-center gap-2 cursor-pointer">
                  Start Your Voyage
                  <ArrowUpRight className="h-5 w-5" />
                </button>
                <button id="view-liftoff-btn" className="flex items-center gap-2 text-sm font-medium text-white font-body cursor-pointer hover:text-white/80 transition-colors">
                  View Liftoff
                  <PlayIcon className="h-4 w-4" />
                </button>
              </motion.div>

              {/* Stats */}
              <motion.div
                initial={HERO_INITIAL}
                animate={HERO_ANIMATE}
                transition={heroTrans(1.3)}
                className="flex items-stretch gap-4 mt-8 flex-wrap justify-center"
              >
                <div className="liquid-glass p-5 flex flex-col justify-between" style={{ width: 220, borderRadius: "1.25rem" }}>
                  <ClockSvg />
                  <div className="mt-4">
                    <p className="font-heading italic text-white leading-none" style={{ fontSize: "2.25rem", letterSpacing: "-1px" }}>34.5 Min</p>
                    <p className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</p>
                  </div>
                </div>
                <div className="liquid-glass p-5 flex flex-col justify-between" style={{ width: 220, borderRadius: "1.25rem" }}>
                  <GlobeSvg />
                  <div className="mt-4">
                    <p className="font-heading italic text-white leading-none" style={{ fontSize: "2.25rem", letterSpacing: "-1px" }}>2.8B+</p>
                    <p className="text-xs text-white font-body font-light mt-2">Users Across the Globe</p>
                  </div>
                </div>
              </motion.div>
            </div>

            {/* Partners */}
            <motion.div
              initial={HERO_INITIAL}
              animate={HERO_ANIMATE}
              transition={heroTrans(1.4)}
              className="flex flex-col items-center gap-4 pb-8 mt-8"
            >
              <div className="liquid-glass rounded-full px-3.5 py-1">
                <span className="text-xs font-medium text-white font-body">Collaborating with top aerospace pioneers globally</span>
              </div>
              <div className="flex items-center gap-12 md:gap-16 flex-wrap justify-center px-8">
                {["Aeon", "Vela", "Apex", "Orbit", "Zeno"].map(function(name) {
                  return (
                    <span key={name} className="font-heading italic text-white text-2xl md:text-3xl tracking-tight">
                      {name}
                    </span>
                  );
                })}
              </div>
            </motion.div>
          </div>
        </section>
      );
    }

    // ─── CapabilitiesSection ───────────────────────
    var CARDS_DATA = [
      {
        iconType: "image",
        tags: ["Natural Context", "Photo Realism", "Infinite Settings", "Eco-Vibe"],
        title: "AI Scenery",
        body: "AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests.",
      },
      {
        iconType: "movie",
        tags: ["Scale Fast", "Visual Consistency", "Time Saver", "Ready to Post"],
        title: "Batch Production",
        body: "Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.",
      },
      {
        iconType: "bulb",
        tags: ["Ray Tracing", "Physical Shadows", "Studio Quality", "Sunlight Sync"],
        title: "Smart Lighting",
        body: "Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight.",
      },
    ];

    function CardIconComp(props) {
      if (props.type === "image") return <ImgIcon />;
      if (props.type === "movie") return <MovieIcon />;
      return <BulbIcon />;
    }

    function CapabilityCard(props) {
      var card = props.card;
      return (
        <div className="liquid-glass flex flex-col" style={{ borderRadius: "1.25rem", padding: "1.5rem", minHeight: 360 }}>
          <div className="flex items-start justify-between gap-4">
            <div
              className="liquid-glass flex items-center justify-center text-white flex-shrink-0"
              style={{ width: 44, height: 44, borderRadius: "0.75rem" }}
            >
              <CardIconComp type={card.iconType} />
            </div>
            <div className="flex flex-wrap justify-end gap-1.5" style={{ maxWidth: "70%" }}>
              {card.tags.map(function(tag) {
                return (
                  <span key={tag} className="liquid-glass rounded-full px-3 py-1 text-white/90 font-body whitespace-nowrap" style={{ fontSize: 11 }}>
                    {tag}
                  </span>
                );
              })}
            </div>
          </div>

          <div className="flex-1" />

          <div className="mt-6">
            <h3 className="font-heading italic text-white leading-none" style={{ fontSize: "clamp(1.75rem, 3vw, 2.25rem)", letterSpacing: "-1px" }}>
              {card.title}
            </h3>
            <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug" style={{ maxWidth: "32ch" }}>
              {card.body}
            </p>
          </div>
        </div>
      );
    }

    function CapabilitiesSection() {
      return (
        <section id="capabilities" className="relative bg-black overflow-hidden" style={{ minHeight: "100vh" }}>
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
            className="absolute inset-0 w-full h-full object-cover z-0"
          />

          <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col" style={{ minHeight: "100vh" }}>
            <div className="mb-auto">
              <p className="text-sm font-body text-white/80 mb-6">// Capabilities</p>
              <h2 className="font-heading italic text-white leading-[0.9] tracking-[-3px]" style={{ fontSize: "clamp(3.5rem, 8vw, 6rem)" }}>
                Production<br />evolved
              </h2>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
              {CARDS_DATA.map(function(card, idx) {
                return <CapabilityCard key={idx} card={card} />;
              })}
            </div>
          </div>
        </section>
      );
    }

    // ─── App ───────────────────────────────────────
    function App() {
      return (
        <React.Fragment>
          <HeroSection />
          <CapabilitiesSection />
        </React.Fragment>
      );
    }

    var rootEl = document.getElementById("root");
    var reactRoot = ReactDOM.createRoot(rootEl);
    reactRoot.render(React.createElement(App, null));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyFare Analytics — Premium ML Dashboard</title>
  <meta name="description" content="State-of-the-art interactive visual analytics and exploratory data insights for the SkyFare AI flight price prediction model." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["'Outfit'", "sans-serif"],
            body: ["'Plus Jakarta Sans'", "sans-serif"],
          },
          colors: {
            darkbg: "#030712",
            accent: {
              purple: "#8B5CF6",
              teal: "#10B981",
              pink: "#EC4899",
              blue: "#3B82F6",
            }
          }
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      background-color: #030712; 
      color: #f3f4f6; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      overflow-x: hidden; 
      scroll-behavior: smooth;
    }

    /* Webkit scrollbar customization */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #030712;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.3);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.5);
    }

    /* Glassmorphism styling */
    .glass-card {
      background: rgba(17, 24, 39, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .glass-card-glow {
      position: relative;
    }
    .glass-card-glow::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(16, 185, 129, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }
    .glass-card-glow:hover::after {
      opacity: 1;
    }

    /* Ambient animated backdrops */
    .glowing-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      pointer-events: none;
      animation: float 20s infinite alternate;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    /* Grid overlay pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
      pointer-events: none;
    }

    /* Pulse effect for status */
    .status-pulse {
      animation: statusPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.1); }
    }
  </style>

  <!-- React, ReactDOM, Babel, Framer Motion -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.Motion || window.FramerMotion || {};</script>
</head>
<body className="relative min-h-screen pb-20 select-none">

  <!-- Static/Grid Assets -->
  <div class="grid-pattern"></div>

  <!-- Background Orbs -->
  <div class="glowing-orb w-[700px] h-[700px] bg-accent-purple top-[-10%] left-[-10%]"></div>
  <div class="glowing-orb w-[600px] h-[600px] bg-accent-teal bottom-[10%] right-[-10%] animation-delay-2000"></div>
  <div class="glowing-orb w-[400px] h-[400px] bg-accent-pink top-[40%] left-[30%] animation-delay-4000"></div>

  <div id="root" className="relative z-10"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const Motion = window.Motion;
    const { motion, AnimatePresence } = Motion;

    const VISUALIZATIONS = [
      {
        id: "distribution",
        title: "Price Distribution",
        file: "chart1_price_distribution.png",
        description: "Explores flight pricing frequencies across Indian domestic routes, highlighting outliers and density distributions.",
        insights: [
          "Fares predominantly concentrate within the ₹4,000 to ₹12,000 interval.",
          "Right-skewed data curve showcases premium fare segments and luxury pricing peaks.",
          "Applying a log transformation helps regression models scale input distributions for better generalization."
        ]
      },
      {
        id: "airline",
        title: "Fare by Airline",
        file: "chart2_price_airline.png",
        description: "A comprehensive breakdown of airline pricing bands, medians, and distribution ranges.",
        insights: [
          "Jet Airways Business and Vistara Premium Economy drive the top tier price ranges.",
          "Budget-friendly operators (IndiGo, SpiceJet) keep pricing compact and tightly managed.",
          "Distinct separation in airline pricing bands directly impacts flight booking algorithms."
        ]
      },
      {
        id: "stops",
        title: "Stops Impact",
        file: "chart3_price_stops.png",
        description: "Compares average price behaviors and ranges based on the count of route layovers.",
        insights: [
          "Flights with 1 or 2 stops consistently show higher average prices than direct routes.",
          "Layovers generally correspond to significantly longer flight routes, driving up baseline operational costs.",
          "Direct flights maintain lower baseline tariffs on major primary connections."
        ]
      },
      {
        id: "duration",
        title: "Duration Correlation",
        file: "chart4_price_duration.png",
        description: "Scatter plot plotting pricing points against total transit duration (in minutes).",
        insights: [
          "Positive correlation verified: price scales upward as total travel duration increases.",
          "Significant variance is visible around 10-15 hour durations due to optional long layovers.",
          "Flight duration represents direct fuel consumption, serving as a pricing floor."
        ]
      },
      {
        id: "seasonality",
        title: "Seasonal Trends",
        file: "chart5_price_month.png",
        description: "Seasonality patterns tracking average prices and flight densities across active travel months.",
        insights: [
          "Average fares peak during March, April, and May, matching major holiday periods.",
          "The data covers mostly March to June, demonstrating immediate demand-based spikes.",
          "Integrating seasonal pricing parameters prevents underestimating ticket demand during high-traffic months."
        ]
      },
      {
        id: "timeofday",
        title: "Departure Hour",
        file: "chart6_price_hour.png",
        description: "Fares analyzed against departure timestamps to track time-of-day pricing advantages.",
        insights: [
          "Early morning departures (4:00 AM - 6:00 AM) feature the lowest ticket fares.",
          "Business-preferred commute windows (8:00 AM - 11:00 AM) command premium prices.",
          "Bucketing departure hours allows predictors to capture passenger preference spikes."
        ]
      },
      {
        id: "outliers",
        title: "Outlier Analysis",
        file: "plot_outliers_before.png",
        description: "Highlights high-variance prices before statistical cleaning.",
        insights: [
          "Fares above ₹20,000 skew standard regression coefficients.",
          "Data cleaning relies on the Interquartile Range (IQR) method (Q3 + 1.5 * IQR) to remove outliers.",
          "Filtering these extreme values guarantees robust, realistic predictions for economy ticket prices."
        ]
      }
    ];

    // Mock Live Price Predictor directly in the dashboard
    function Simulator() {
      const [airline, setAirline] = useState("IndiGo");
      const [stops, setStops] = useState(0);
      const [duration, setDuration] = useState(120);
      const [price, setPrice] = useState(4500);

      useEffect(() => {
        // Simple mock regression formula based on analysis coefficients
        let basePrice = 3000;
        
        // Airline multipliers
        const airlinePrices = {
          "IndiGo": 800,
          "Air India": 1800,
          "Jet Airways": 3500,
          "SpiceJet": 500,
          "Vistara": 2200,
          "Air Asia": 300
        };
        
        basePrice += (airlinePrices[airline] || 1000);
        basePrice += (stops * 2500);
        basePrice += (duration * 8.5); // ₹8.5 per minute
        
        setPrice(Math.round(basePrice));
      }, [airline, stops, duration]);

      return (
        <div className="glass-card rounded-3xl p-6 border border-white/5 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-indigo-500/10 to-transparent rounded-full filter blur-xl"></div>
          
          <h3 className="text-lg font-bold font-heading text-white mb-4 flex items-center gap-2">
            <svg className="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            Live Price Simulator
          </h3>
          
          <div className="space-y-4">
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1">Airline Carrier</label>
              <select 
                value={airline} 
                onChange={(e) => setAirline(e.target.value)}
                className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
              >
                <option value="IndiGo" className="bg-darkbg">IndiGo</option>
                <option value="Air India" className="bg-darkbg">Air India</option>
                <option value="Jet Airways" className="bg-darkbg">Jet Airways</option>
                <option value="SpiceJet" className="bg-darkbg">SpiceJet</option>
                <option value="Vistara" className="bg-darkbg">Vistara</option>
                <option value="Air Asia" className="bg-darkbg">Air Asia</option>
              </select>
            </div>
            
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1">Layovers</label>
                <select 
                  value={stops} 
                  onChange={(e) => setStops(Number(e.target.value))}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
                >
                  <option value={0} className="bg-darkbg">Non-stop</option>
                  <option value={1} className="bg-darkbg">1 Stop</option>
                  <option value={2} className="bg-darkbg">2 Stops</option>
                </select>
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1">Duration (min)</label>
                <input 
                  type="number"
                  value={duration}
                  onChange={(e) => setDuration(Math.max(30, Number(e.target.value)))}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
                  min="30"
                  max="1200"
                />
              </div>
            </div>
            
            <div className="mt-4 pt-4 border-t border-white/5 flex items-center justify-between">
              <span className="text-sm font-medium text-gray-400">Estimated Fare:</span>
              <span className="text-2xl font-black font-heading text-teal-400 bg-teal-500/10 px-3 py-1 rounded-xl border border-teal-500/20">
                ₹{price.toLocaleString('en-IN')}
              </span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [selectedTab, setSelectedTab] = useState(VISUALIZATIONS[0].id);
      const [activeImg, setActiveImg] = useState(null); // Lightbox
      const activeVis = VISUALIZATIONS.find(v => v.id === selectedTab);

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 md:pt-12 pb-24">
          
          {/* Header Navigation */}
          <nav className="flex items-center justify-between mb-12 border-b border-white/5 pb-6">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-teal-400 flex items-center justify-center font-heading font-extrabold italic text-white text-xl">
                S
              </div>
              <div>
                <div className="text-sm font-extrabold font-heading text-white tracking-wider leading-none">SKYFARE</div>
                <div className="text-[10px] font-bold text-gray-500 tracking-widest mt-0.5">ANALYTICS SYSTEM</div>
              </div>
            </div>
            
            <div className="flex items-center gap-3">
              <a 
                href="https://github.com/Keshav-Bhatnagar/ML-Project" 
                target="_blank"
                rel="noreferrer"
                className="flex items-center gap-2 bg-white/5 border border-white/10 hover:bg-white/10 rounded-full px-4 py-2 text-xs font-semibold text-gray-300 transition-all"
              >
                <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path fillRule="evenodd" clipRule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
                </svg>
                GitHub Repo
              </a>
            </div>
          </nav>

          {/* Hero Header Section */}
          <div className="text-center max-w-3xl mx-auto mb-16 relative">
            <div className="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-full px-4 py-1.5 text-xs font-semibold uppercase tracking-wider text-indigo-400 mb-5">
              <span className="w-2 h-2 rounded-full bg-indigo-500 status-pulse"></span>
              98.7% Model $R^2$ Accuracy
            </div>
            <h1 className="text-5xl md:text-6xl font-black font-heading tracking-tight text-white leading-tight mb-4">
              SkyFare Visual <br/>
              <span className="bg-gradient-to-r from-indigo-400 via-teal-300 to-emerald-400 bg-clip-text text-transparent">Model Diagnostics</span>
            </h1>
            <p className="text-gray-400 text-base font-body leading-relaxed max-w-xl mx-auto">
              Track the exploratory data analysis, seasonal anomalies, and performance plots behind our Random Forest model training pipeline.
            </p>
          </div>

          {/* Main Content Layout */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            {/* Left Column: Sidebar & Simulator */}
            <div className="lg:col-span-4 space-y-6">
              
              {/* Tab Navigation Card */}
              <div className="glass-card rounded-3xl p-6 border border-white/5">
                <div className="text-xs font-bold uppercase tracking-wider text-teal-400 mb-4 px-2">Diagnostic Categories</div>
                <div className="space-y-1">
                  {VISUALIZATIONS.map(vis => (
                    <button
                      key={vis.id}
                      onClick={() => setSelectedTab(vis.id)}
                      className={`w-full text-left px-4 py-3.5 rounded-2xl border text-sm font-semibold transition-all flex items-center justify-between group ${
                        selectedTab === vis.id
                          ? "bg-indigo-500/10 border-indigo-500/30 text-indigo-300"
                          : "border-transparent text-gray-400 hover:text-white hover:bg-white/5"
                      }`}
                    >
                      <span>{vis.title}</span>
                      <svg 
                        className={`w-4 h-4 transition-transform ${
                          selectedTab === vis.id 
                            ? "translate-x-0 opacity-100 text-indigo-400" 
                            : "opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 text-gray-400"
                        }`}
                        fill="none" 
                        viewBox="0 0 24 24" 
                        stroke="currentColor"
                      >
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" />
                      </svg>
                    </button>
                  ))}
                </div>
              </div>

              {/* Live Simulator component */}
              <Simulator />

              {/* Model Stats Card */}
              <div className="glass-card rounded-3xl p-6 border border-white/5 relative overflow-hidden">
                <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Model Validation Summary</h4>
                <div className="space-y-3 font-body">
                  <div className="flex justify-between items-center py-2 border-b border-white/5">
                    <span className="text-gray-400 text-sm">Target Metric</span>
                    <span className="font-semibold text-white">Price (₹ INR)</span>
                  </div>
                  <div className="flex justify-between items-center py-2 border-b border-white/5">
                    <span className="text-gray-400 text-sm">Model Architecture</span>
                    <span className="font-semibold text-indigo-400">Random Forest Regressor</span>
                  </div>
                  <div className="flex justify-between items-center py-2 border-b border-white/5">
                    <span className="text-gray-400 text-sm">Estimators (Trees)</span>
                    <span className="font-semibold text-white">100 Decision Trees</span>
                  </div>
                  <div className="flex justify-between items-center py-2 border-b border-white/5">
                    <span className="text-gray-400 text-sm">Dataset size</span>
                    <span className="font-semibold text-white">~11,800 records</span>
                  </div>
                  <div className="flex justify-between items-center py-2">
                    <span className="text-gray-400 text-sm">Train R² Score</span>
                    <span className="font-semibold text-teal-400">98.68%</span>
                  </div>
                </div>
              </div>

            </div>

            {/* Right Column: Visualization Display & Insights */}
            <div className="lg:col-span-8">
              <div className="glass-card rounded-3xl p-6 md:p-8 border border-white/5 glass-card-glow transition-all">
                
                {/* Active Tab Details */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                  <div>
                    <h2 className="text-3xl font-black font-heading text-white tracking-tight">{activeVis.title}</h2>
                    <p className="text-gray-400 text-sm mt-1 font-body leading-relaxed">{activeVis.description}</p>
                  </div>
                  <div className="flex-shrink-0">
                    <button
                      onClick={() => setActiveImg(activeVis.file)}
                      className="flex items-center gap-2 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 hover:text-indigo-200 border border-indigo-500/20 rounded-xl px-4 py-2 text-xs font-semibold transition-all"
                    >
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                      </svg>
                      Inspect Full Resolution
                    </button>
                  </div>
                </div>

                {/* Display Frame */}
                <div className="relative group cursor-pointer w-full rounded-2xl overflow-hidden bg-black/40 border border-white/5 p-4 flex items-center justify-center min-h-[380px] mb-8"
                     onClick={() => setActiveImg(activeVis.file)}>
                  <div className="absolute inset-0 bg-gradient-to-t from-darkbg/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-end justify-center pb-6">
                    <span className="bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      </svg>
                      Click to expand visualization
                    </span>
                  </div>
                  
                  <img
                    src={activeVis.file}
                    alt={activeVis.title}
                    className="max-h-[420px] w-auto object-contain rounded-lg shadow-2xl transition-transform duration-300 group-hover:scale-[1.02]"
                    onError={(e) => {
                      e.target.onerror = null;
                      // Fallback placeholder with same aspect ratio if local files are missing in browser preview
                      e.target.src = "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=800";
                    }}
                  />
                </div>

                {/* Insights Listing */}
                <div>
                  <h3 className="text-xs font-bold uppercase tracking-widest text-teal-400 mb-4 font-body">Analytical Takeaways</h3>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    {activeVis.insights.map((insight, idx) => (
                      <div key={idx} className="bg-white/5 border border-white/5 rounded-2xl p-4 flex flex-col justify-between">
                        <p className="text-gray-300 text-xs leading-relaxed font-body mb-3">{insight}</p>
                        <span className="w-6 h-6 rounded-lg bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 flex items-center justify-center text-[10px] font-bold">
                          0{idx + 1}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </div>

          </div>

          {/* Fullscreen Lightbox Portal */}
          <AnimatePresence>
            {activeImg && (
              <div 
                className="fixed inset-0 z-50 bg-black/90 backdrop-blur-xl flex items-center justify-center p-4"
                onClick={() => setActiveImg(null)}
              >
                <div className="absolute top-6 right-6 text-white cursor-pointer hover:text-gray-300">
                  <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </div>
                <div className="max-w-5xl max-h-[85vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                  <img
                    src={activeImg}
                    alt="Expanded Visualization"
                    className="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-white/10"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=800";
                    }}
                  />
                </div>
              </div>
            )}
          </AnimatePresence>

        </div>
      );
    }

    const rootEl = document.getElementById("root");
    const reactRoot = ReactDOM.createRoot(rootEl);
    reactRoot.render(<App />);
  </script>
</body>
</html>

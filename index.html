<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyFare Analytics — Premium ML Dashboard</title>
  <meta name="description" content="State-of-the-art interactive visual analytics, 3D Indian flight route mapping, and exploratory data insights for the SkyFare AI flight price prediction model." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["'Outfit'", "sans-serif"],
            body: ["'Plus Jakarta Sans'", "sans-serif"],
          },
          colors: {
            darkbg: "#030712",
            accent: {
              purple: "#8B5CF6",

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      background-color: #030712; 
      color: #f3f4f6; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      overflow-x: hidden; 
      scroll-behavior: smooth;
    }

    /* Webkit scrollbar customization */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #030712;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.3);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.5);
    }

    /* Glassmorphism styling */
    .glass-card {
      background: rgba(17, 24, 39, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .glass-card-glow {
      position: relative;
    }
    .glass-card-glow::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(16, 185, 129, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }
    .glass-card-glow:hover::after {
      opacity: 1;
    }

    /* Ambient animated backdrops */
    .glowing-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      pointer-events: none;
      animation: float 20s infinite alternate;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    /* Grid overlay pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
      pointer-events: none;
    }

    /* Pulse effect for status */
    .status-pulse {
      animation: statusPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.1); }
    }
  </style>

    const VISUALIZATIONS = [

    // Helper to calculate Haversine distance
    const calcHaversine = (lat1, lon1, lat2, lon2) => {
      const R = 6371; // km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return Math.round(R * c);
    };

    // Point in Polygon algorithm to test coordinate boundaries
    const isPointInPolygon = (lat, lon, polygon) => {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].lon, yi = polygon[i].lat;
        const xj = polygon[j].lon, yj = polygon[j].lat;
        const intersect = ((yi > lat) !== (yj > lat))
            && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    };

    // Interactive 3D India Route Map Component using Three.js
    function IndiaFlightMap({ source, destination }) {
      const mountRef = useRef(null);

      useEffect(() => {
        if (!mountRef.current) return;

        const width = mountRef.current.clientWidth;
        const height = mountRef.current.clientHeight || 380;
        
        // Scene Setup
        const scene = new THREE.Scene();
        
        // Perspective Camera tilted for pseudo-3D look
        const camera = new THREE.PerspectiveCamera(40, width / height, 0.1, 1000);
        camera.position.set(0, -6, 16);
        camera.lookAt(0, 1.2, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mountRef.current.appendChild(renderer.domElement);

        // Map projection parameters
        const scale = 0.55;
        const centerLon = 82.5;
        const centerLat = 22.0;

        const projectCoords = (lat, lon) => {
          return new THREE.Vector3(
            (lon - centerLon) * scale,
            (lat - centerLat) * scale,
            0
          );
        };

        const mapGroup = new THREE.Group();
        scene.add(mapGroup);

        // 1. Draw India Border Line
        const borderPoints = INDIA_BORDER.map(pt => projectCoords(pt.lat, pt.lon));
        const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
        const borderMat = new THREE.LineBasicMaterial({
          color: 0x4f46e5, // Glowing Indigo
          linewidth: 2,
          transparent: true,
          opacity: 0.55
        });
        const borderLine = new THREE.LineLoop(borderGeo, borderMat);
        mapGroup.add(borderLine);

        // 2. Generate landmass dot grid (hologram particle grid of India)
        const dotPoints = [];
        const latMin = 8.0, latMax = 35.5;
        const lonMin = 68.0, lonMax = 97.0;
        const gridStep = 0.55;

        for (let lat = latMin; lat <= latMax; lat += gridStep) {
          for (let lon = lonMin; lon <= lonMax; lon += gridStep) {
            if (isPointInPolygon(lat, lon, INDIA_BORDER)) {
              dotPoints.push(projectCoords(lat, lon));
            }
          }
        }

        const dotGeo = new THREE.BufferGeometry().setFromPoints(dotPoints);
        const dotMat = new THREE.PointsMaterial({
          color: 0x10b981, // Teal glow particles
          size: 0.12,
          transparent: true,
          opacity: 0.35
        });
        const landmapGrid = new THREE.Points(dotGeo, dotMat);
        mapGroup.add(landmapGrid);

        // 3. Plot Airport Hubs
        const airportGroup = new THREE.Group();
        mapGroup.add(airportGroup);

        Object.entries(AIRPORT_MAP).forEach(([name, coords]) => {
          const pos = projectCoords(coords.lat, coords.lon);
          
          // Outer Ring
          const ringGeo = new THREE.RingGeometry(0.18, 0.22, 16);
          const ringMat = new THREE.MeshBasicMaterial({
            color: 0x10b981,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.5
          });
          const ring = new THREE.Mesh(ringGeo, ringMat);
          ring.position.copy(pos);
          airportGroup.add(ring);

          // Inner Center Point
          const coreGeo = new THREE.CircleGeometry(0.08, 8);
          const coreMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.9
          });
          const core = new THREE.Mesh(coreGeo, coreMat);
          core.position.copy(pos);
          airportGroup.add(core);
        });

        // 4. Construct Flight Arc and Plane Particle
        let flightArc = null;
        let planeMesh = null;
        let arcCurve = null;

        const srcData = AIRPORT_MAP[source];
        const dstData = AIRPORT_MAP[destination];

        if (srcData && dstData) {
          const p1 = projectCoords(srcData.lat, srcData.lon);
          const p2 = projectCoords(dstData.lat, dstData.lon);

          // Elevate arc midpoint outwards (Z-axis is perpendicular to flat map plane)
          const dist = p1.distanceTo(p2);
          const midPoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
          midPoint.z = dist * 0.35; // Arch height based on distance

          arcCurve = new THREE.QuadraticBezierCurve3(p1, midPoint, p2);
          const points = arcCurve.getPoints(50);
          const arcGeo = new THREE.BufferGeometry().setFromPoints(points);
          const arcMat = new THREE.LineBasicMaterial({
            color: 0xec4899, // Pink neon arch
            linewidth: 2,
            transparent: true,
            opacity: 0.75
          });
          flightArc = new THREE.Line(arcGeo, arcMat);
          mapGroup.add(flightArc);

          // Plane (glowing realistic commercial airliner model)
          const createAirplane = () => {
            const pGroup = new THREE.Group();
            
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // White fuselage
            const wingMat = new THREE.MeshBasicMaterial({ color: 0xd1d5db }); // Light grey wings
            const engineMat = new THREE.MeshBasicMaterial({ color: 0x374151 }); // Dark grey engines
            const finMat = new THREE.MeshBasicMaterial({ color: 0x1e3a8a }); // Indigo blue tail fin
            const windowMat = new THREE.MeshBasicMaterial({ color: 0x090d16 }); // Dark cockpit/windows

            // 1. Fuselage (Body)
            const bodyGeo = new THREE.CylinderGeometry(0.045, 0.045, 0.5, 10);
            bodyGeo.rotateX(Math.PI / 2); // align forward along Z axis
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            pGroup.add(body);

            // Nose Cone
            const noseGeo = new THREE.ConeGeometry(0.045, 0.1, 10);
            noseGeo.rotateX(Math.PI / 2);
            const nose = new THREE.Mesh(noseGeo, wingMat);
            nose.position.set(0, 0, 0.3); // 0.5/2 + 0.1/2 = 0.3
            pGroup.add(nose);

            // Tail Cone
            const tailConeGeo = new THREE.ConeGeometry(0.045, 0.1, 10);
            tailConeGeo.rotateX(-Math.PI / 2);
            const tailCone = new THREE.Mesh(tailConeGeo, bodyMat);
            tailCone.position.set(0, 0, -0.3);
            pGroup.add(tailCone);

            // 2. Cockpit Window
            const cockpitGeo = new THREE.BoxGeometry(0.06, 0.02, 0.03);
            const cockpit = new THREE.Mesh(cockpitGeo, windowMat);
            cockpit.position.set(0, 0.02, 0.24);
            cockpit.rotation.x = -0.35;
            pGroup.add(cockpit);

            // Passenger Windows (along both sides)
            for (let offset = -0.15; offset <= 0.15; offset += 0.05) {
              const windowGeo = new THREE.BoxGeometry(0.01, 0.015, 0.008);
              
              // Left Window
              const wL = new THREE.Mesh(windowGeo, windowMat);
              wL.position.set(-0.046, 0.005, offset);
              pGroup.add(wL);
              
              // Right Window
              const wR = new THREE.Mesh(windowGeo, windowMat);
              wR.position.set(0.046, 0.005, offset);
              pGroup.add(wR);
            }

            // 3. Swept-Back Wings
            // Left Wing
            const wingLGeo = new THREE.BoxGeometry(0.32, 0.012, 0.1);
            wingLGeo.translate(-0.16, 0, 0); // pivot at base
            const wingL = new THREE.Mesh(wingLGeo, wingMat);
            wingL.position.set(0, -0.01, 0.04);
            wingL.rotation.y = -0.28; // angle backward
            pGroup.add(wingL);

            // Right Wing
            const wingRGeo = new THREE.BoxGeometry(0.32, 0.012, 0.1);
            wingRGeo.translate(0.16, 0, 0); // pivot at base
            const wingR = new THREE.Mesh(wingRGeo, wingMat);
            wingR.position.set(0, -0.01, 0.04);
            wingR.rotation.y = 0.28; // angle backward
            pGroup.add(wingR);

            // 4. Jet Engines (hanging under wings)
            const engineGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.12, 8);
            engineGeo.rotateX(Math.PI / 2);
            
            // Left Engine
            const engineL = new THREE.Mesh(engineGeo, engineMat);
            engineL.position.set(-0.14, -0.03, 0.02);
            pGroup.add(engineL);

            // Right Engine
            const engineR = new THREE.Mesh(engineGeo, engineMat);
            engineR.position.set(0.14, -0.03, 0.02);
            pGroup.add(engineR);

            // 5. Swept-Back Horizontal Tail Stabilizers
            // Left Tail
            const tailLGeo = new THREE.BoxGeometry(0.14, 0.008, 0.05);
            tailLGeo.translate(-0.07, 0, 0);
            const tailL = new THREE.Mesh(tailLGeo, wingMat);
            tailL.position.set(0, 0.01, -0.2);
            tailL.rotation.y = -0.32;
            pGroup.add(tailL);

            // Right Tail
            const tailRGeo = new THREE.BoxGeometry(0.14, 0.008, 0.05);
            tailRGeo.translate(0.07, 0, 0);
            const tailR = new THREE.Mesh(tailRGeo, wingMat);
            tailR.position.set(0, 0.01, -0.2);
            tailR.rotation.y = 0.32;
            pGroup.add(tailR);

            // 6. Vertical Fin (Tail stabilizer)
            const finGeo = new THREE.BoxGeometry(0.012, 0.13, 0.07);
            finGeo.translate(0, 0.065, -0.015); // pivot base
            const fin = new THREE.Mesh(finGeo, finMat);
            fin.position.set(0, 0.03, -0.22);
            fin.rotation.x = -0.35; // slant back
            pGroup.add(fin);

            return pGroup;
          };
          planeMesh = createAirplane();
          mapGroup.add(planeMesh);
        }

        let planeProgress = 0;
        let frameId;

        // Animation Loop
        const animate = () => {
          frameId = requestAnimationFrame(animate);

          // Make the India Map hover/tilt subtly in pseudo-3D
          const time = Date.now() * 0.0015;
          mapGroup.rotation.z = Math.sin(time * 0.3) * 0.04;
          mapGroup.rotation.x = -0.4 + Math.cos(time * 0.3) * 0.03;

          // Holographic landmass dot ripple animation
          const positions = landmapGrid.geometry.attributes.position.array;
          for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const y = positions[i + 1];
            // Ripple wave on Z axis
            positions[i + 2] = Math.sin(time * 1.5 + x * 0.4 + y * 0.4) * 0.12;
          }
          landmapGrid.geometry.attributes.position.needsUpdate = true;

          // Animate flight plane progress
          if (arcCurve && planeMesh) {
            planeProgress += 0.009; // slightly slower for premium, realistic motion
            if (planeProgress > 1) planeProgress = 0;
            
            const planePos = arcCurve.getPointAt(planeProgress);
            const tangent = arcCurve.getTangentAt(planeProgress);
            
            planeMesh.position.copy(planePos);
            
            // Orient flight group along the flight path tangent vector
            const targetLook = planePos.clone().add(tangent);
            planeMesh.lookAt(targetLook);
          }

          renderer.render(scene, camera);
        };

        animate();

        // Handle Resize
        const handleResize = () => {
          if (!mountRef.current) return;
          const w = mountRef.current.clientWidth;
          const h = mountRef.current.clientHeight || 380;
          renderer.setSize(w, h);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        };
        window.addEventListener('resize', handleResize);

        // Cleanup
        return () => {
          cancelAnimationFrame(frameId);
          window.removeEventListener('resize', handleResize);
          if (mountRef.current && renderer.domElement) {
            mountRef.current.removeChild(renderer.domElement);
          }
          scene.clear();
        };
      }, [source, destination]);

      return (
        <div className="glass-card rounded-3xl p-5 border border-white/5 relative h-[420px] overflow-hidden flex flex-col justify-end">
          <div className="absolute top-4 left-4 text-xs font-bold text-gray-400 tracking-wider flex items-center gap-2 z-20">
            <span className="w-2 h-2 rounded-full bg-accent-pink status-pulse"></span>
            3D Holographic India Vector Route Map
          </div>
          
          <div className="absolute inset-0 z-10" ref={mountRef}></div>

          {/* Details Overlay */}
          <div className="relative z-20 bg-darkbg/85 border border-white/5 backdrop-blur-md rounded-2xl p-3.5 flex justify-between items-center text-xs font-semibold">
            <div className="flex gap-2 items-center">
              <span className="text-indigo-400 font-heading text-sm uppercase">{source}</span>
              <span className="text-gray-600">→</span>
              <span className="text-teal-400 font-heading text-sm uppercase">{destination}</span>
            </div>
            {AIRPORT_MAP[source] && AIRPORT_MAP[destination] && (
              <div className="text-gray-400">
                Route Distance: <strong className="text-white font-heading">
                  {calcHaversine(AIRPORT_MAP[source].lat, AIRPORT_MAP[source].lon, AIRPORT_MAP[destination].lat, AIRPORT_MAP[destination].lon)} km
                </strong>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Simulator component
    function Simulator({ source, setSource, destination, setDestination }) {
      const [airline, setAirline] = useState("IndiGo");
      const [stops, setStops] = useState(0);
      const [duration, setDuration] = useState(120);
      const [price, setPrice] = useState(4500);

      useEffect(() => {
        let basePrice = 3000;
        
        // Airline margins
        const airlinePrices = {
          "IndiGo": 800,
          "Air India": 1800,
          "Jet Airways": 3500,
          "SpiceJet": 500,
          "Vistara": 2200,
          "Air Asia": 300
        };
        
        // Dynamic pricing using coordinates distance
        let dist = 800;
        if (AIRPORT_MAP[source] && AIRPORT_MAP[destination]) {
          dist = calcHaversine(
            AIRPORT_MAP[source].lat, AIRPORT_MAP[source].lon,
            AIRPORT_MAP[destination].lat, AIRPORT_MAP[destination].lon
          );
        }

        basePrice += (airlinePrices[airline] || 1000);
        basePrice += (stops * 2000);
        basePrice += (dist * 3.8); // ₹3.8 per km distance floor
        basePrice += (duration * 2.5);
        
        setPrice(Math.round(basePrice));
      }, [airline, stops, duration, source, destination]);

      return (
        <div className="glass-card rounded-3xl p-6 border border-white/5 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-indigo-500/10 to-transparent rounded-full filter blur-xl"></div>
          
          <h3 className="text-lg font-bold font-heading text-white mb-4 flex items-center gap-2">

            </svg>
            Interactive Price Simulator
          </h3>
          
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1">Departure</label>
                <select 
                  value={source} 
                  onChange={(e) => setSource(e.target.value)}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
                >
                  <option value="Delhi" className="bg-darkbg">Delhi</option>
                  <option value="Mumbai" className="bg-darkbg">Mumbai</option>
                  <option value="Bangalore" className="bg-darkbg">Bangalore</option>
                  <option value="Chennai" className="bg-darkbg">Chennai</option>
                  <option value="Kolkata" className="bg-darkbg">Kolkata</option>
                </select>
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1">Destination</label>
                <select 
                  value={destination} 
                  onChange={(e) => setDestination(e.target.value)}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
                >
                  <option value="Bangalore" className="bg-darkbg">Bangalore</option>
                  <option value="Delhi" className="bg-darkbg">Delhi</option>
                  <option value="Mumbai" className="bg-darkbg">Mumbai</option>
                  <option value="Chennai" className="bg-darkbg">Chennai</option>
                  <option value="Kolkata" className="bg-darkbg">Kolkata</option>
                  <option value="Cochin" className="bg-darkbg">Cochin</option>
                  <option value="Hyderabad" className="bg-darkbg">Hyderabad</option>
                </select>
              </div>
            </div>

            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1">Airline Carrier</label>
              <select 
                value={airline} 
                onChange={(e) => setAirline(e.target.value)}
                className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
              >
                <option value="IndiGo" className="bg-darkbg">IndiGo</option>
                <option value="Air India" className="bg-darkbg">Air India</option>
                <option value="Jet Airways" className="bg-darkbg">Jet Airways</option>
                <option value="SpiceJet" className="bg-darkbg">SpiceJet</option>
                <option value="Vistara" className="bg-darkbg">Vistara</option>
                <option value="Air Asia" className="bg-darkbg">Air Asia</option>
              </select>
            </div>
            
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1">Layovers</label>
                <select 
                  value={stops} 
                  onChange={(e) => setStops(Number(e.target.value))}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
                >
                  <option value={0} className="bg-darkbg">Non-stop</option>
                  <option value={1} className="bg-darkbg">1 Stop</option>
                  <option value={2} className="bg-darkbg">2 Stops</option>
                </select>
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1">Duration (min)</label>
                <input 
                  type="number"
                  value={duration}
                  onChange={(e) => setDuration(Math.max(30, Number(e.target.value)))}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
                  min="30"
                  max="1200"
                />
              </div>
            </div>
            
            <div className="mt-4 pt-4 border-t border-white/5 flex items-center justify-between">
              <span className="text-sm font-medium text-gray-400">Estimated Fare:</span>
              <span className="text-2xl font-black font-heading text-teal-400 bg-teal-500/10 px-3 py-1 rounded-xl border border-teal-500/20">
                ₹{price.toLocaleString('en-IN')}
              </span>
            </div>
          </div>
        </div>
      );
    }

                </svg>
                GitHub Repo
              </a>
            </div>
          </nav>

          {/* Hero Header Section */}
          <div className="text-center max-w-3xl mx-auto mb-16 relative">
            <div className="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-full px-4 py-1.5 text-xs font-semibold uppercase tracking-wider text-indigo-400 mb-5">
              <span className="w-2 h-2 rounded-full bg-indigo-500 status-pulse"></span>
              98.7% Model $R^2$ Accuracy
            </div>
            <h1 className="text-5xl md:text-6xl font-black font-heading tracking-tight text-white leading-tight mb-4">
              SkyFare Visual <br/>
              <span className="bg-gradient-to-r from-indigo-400 via-teal-300 to-emerald-400 bg-clip-text text-transparent">Model Diagnostics</span>
            </h1>
            <p className="text-gray-400 text-base font-body leading-relaxed max-w-xl mx-auto">
              Track the exploratory data analysis, seasonal anomalies, and performance plots behind our Random Forest model training pipeline.
            </p>
          </div>

          {/* Main Content Layout */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            {/* Left Column: Sidebar & Simulator */}
            <div className="lg:col-span-4 space-y-6">
              
              {/* Tab Navigation Card */}
              <div className="glass-card rounded-3xl p-6 border border-white/5">
                <div className="text-xs font-bold uppercase tracking-wider text-teal-400 mb-4 px-2">Diagnostic Categories</div>
                <div className="space-y-1">
                  {VISUALIZATIONS.map(vis => (
                    <button
                      key={vis.id}
                      onClick={() => setSelectedTab(vis.id)}
                      className={`w-full text-left px-4 py-3.5 rounded-2xl border text-sm font-semibold transition-all flex items-center justify-between group ${

                    >

                        fill="none" 
                        viewBox="0 0 24 24" 
                        stroke="currentColor"

                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" />
                      </svg>

              {/* Model Stats Card */}

                  <div className="flex justify-between items-center py-2 border-b border-white/5">

                    <span className="font-semibold text-white">~11,800 records</span>

                    <span className="font-semibold text-teal-400">98.68%</span>
                  </div>
                </div>
              </div>

            </div>

            {/* Right Column: 3D Flight India Map & Visualizations */}
            <div className="lg:col-span-8 space-y-6">
              
              {/* 3D Flight India Map Visualizer */}
              <IndiaFlightMap source={source} destination={destination} />

              {/* Visualizations display card */}
              <div className="glass-card rounded-3xl p-6 md:p-8 border border-white/5 glass-card-glow transition-all">
                
                {/* Active Tab Details */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                  <div>
                    <h2 className="text-2xl font-bold font-heading text-white tracking-tight">{activeVis.title}</h2>
                    <p className="text-gray-400 text-sm mt-1 font-body leading-relaxed">{activeVis.description}</p>
                  </div>
                  <div className="flex-shrink-0">
                    <button
                      onClick={() => setActiveImg(activeVis.file)}
                      className="flex items-center gap-2 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 hover:text-indigo-200 border border-indigo-500/20 rounded-xl px-4 py-2 text-xs font-semibold transition-all"
                    >
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />

                {/* Display Frame */}

                  <img

                      e.target.src = "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=800";
